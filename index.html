<!DOCTYPE html>
<html lang="fr">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLEU4 - Connexion</title>
    <meta name="theme-color" content="#0d0d0d">

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/logo.png?v=2">
    <link rel="apple-touch-icon" href="assets/logo-icon.png?v=2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="BLEU4">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>
<body class="login-page">

<div class="login-container">

    <div class="logo-block">
        <img src="assets/logo.png?v=2" alt="1ère Compagnie B4" class="login-logo">
        <p class="subtitle">Gestion des activités</p>
    </div>

    <div class="card">

        <label>GRADE NOM</label>
        <input
            type="text"
            id="login"
            placeholder="Ex : SDT PINGOUIN"
            autocomplete="off">

        <label>RÔLE</label>

        <select id="role">
            <option value="membre">MEMBRE</option>
            <option value="commandement">COMMANDEMENT</option>
        </select>

        <div id="passwordBox" style="display:none;">

            <label>MOT DE PASSE</label>

            <input
                type="password"
                id="password"
                placeholder="********">

        </div>

        <button id="btnLogin">
            ENTRER
        </button>

    </div>

    <p class="version">BLEU4 v2</p>

</div>

<script type="module" src="js/auth.js"></script>

</body>
</html>
