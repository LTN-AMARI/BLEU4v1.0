<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>BLEU4</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="topbar">
  <div id="userInfo"></div>
  <button id="logoutBtn">Logout</button>
</div>

<div class="container">

<!-- CREATE -->
<div id="createBox">
  <input id="mTitle" placeholder="Titre">
  <input id="mDesc" placeholder="Description">
  <input id="mStart" type="date">
  <input id="mEnd" type="date">
  <button id="createBtn">Créer</button>
</div>

<!-- YEAR -->
<h2 id="yearTitle"></h2>

<div style="display:flex;gap:10px;">
<button id="prevYear">⬅</button>
<button id="nextYear">➡</button>
</div>

<div id="calendar"></div>

<div id="missions"></div>

</div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/missions.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
