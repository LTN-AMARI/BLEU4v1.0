<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLEU4</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="topbar">
    <div id="userInfo">Chargement...</div>
    <button id="logoutBtn">Déconnexion</button>
</div>

<div class="container">

    <!-- CREATION -->
    <div id="createMissionBox" class="card">

        <h2>Créer mission</h2>

        <input id="mTitle" placeholder="Titre">
        <input id="mDesc" placeholder="Description">
        <input id="mStartDate" type="date">
        <input id="mEndDate" type="date">
        <input id="mLocation" placeholder="Lieu">

        <button id="createBtn">Créer mission</button>
    </div>

    <!-- CALENDRIER -->
    <div class="card">
        <h2 id="monthTitle"></h2>
        <div id="calendar"></div>
    </div>

    <!-- MISSIONS -->
    <div id="missions"></div>

</div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/missions.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
