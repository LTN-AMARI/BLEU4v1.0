<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BLEU4 v2</title>

    <meta name="theme-color" content="#0B1F3A">

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/logo.png?v=2">
    <link rel="apple-touch-icon" href="assets/logo.png?v=2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="BLEU4">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- ===================== -->
<!-- ECRAN DE DEMARRAGE -->
<!-- ===================== -->

<div id="splashScreen" class="splash-screen">

    <img src="assets/logo.png?v=2" alt="1ère Compagnie B4" class="splash-logo">

</div>

<!-- ===================== -->
<!-- TOPBAR -->
<!-- ===================== -->

<header class="topbar">

    <div id="userInfo">
        Chargement...
    </div>

    <button id="logoutBtn">
        Déconnexion
    </button>

</header>

<!-- ===================== -->
<!-- CONTENU -->
<!-- ===================== -->

<main class="container">

    <!-- ===================== -->
    <!-- TOUTES LES MISSIONS (gestion, commandement) -->
    <!-- ===================== -->

    <section id="allMissionsBox" class="card">

        <h2>Toutes les missions</h2>

        <div id="allMissionsList"></div>

    </section>

    <!-- ===================== -->
    <!-- CREATION MISSION -->
    <!-- ===================== -->

    <section id="createMissionBox" class="card">

        <h2>Créer une mission</h2>

        <input
            id="mTitle"
            type="text"
            placeholder="Titre">

        <textarea
            id="mDesc"
            placeholder="Description"></textarea>

        <div class="row">

            <div>

                <label>Date début</label>

                <input
                    id="mStart"
                    type="text"
                    inputmode="numeric"
                    maxlength="10"
                    placeholder="JJ/MM/AAAA">

            </div>

            <div>

                <label>Date fin</label>

                <input
                    id="mEnd"
                    type="text"
                    inputmode="numeric"
                    maxlength="10"
                    placeholder="JJ/MM/AAAA">

            </div>

        </div>

        <input
            id="mLocation"
            type="text"
            placeholder="Lieu">

        <input
            id="mConcerned"
            type="text"
            placeholder="Concernés : Tous, ou noms séparés par virgule (ex: SDT PINGOUIN, CPL DUPONT)">

        <button id="createBtn">
            Créer la mission
        </button>

    </section>

    <!-- ===================== -->
    <!-- CALENDRIER -->
    <!-- ===================== -->

    <section class="card">

        <div class="calendar-header">

            <button id="prevMonth">
                ◀
            </button>

            <h2 id="monthTitle">
                Mois
            </h2>

            <button id="nextMonth">
                ▶
            </button>

        </div>

        <!-- jours semaine -->

        <div id="weekdays" class="weekdays">

            <div>Lun</div>
            <div>Mar</div>
            <div>Mer</div>
            <div>Jeu</div>
            <div>Ven</div>
            <div>Sam</div>
            <div>Dim</div>

        </div>

        <!-- calendrier -->

        <div id="calendar" class="calendar"></div>

    </section>

    <!-- ===================== -->
    <!-- MISSIONS -->
    <!-- ===================== -->

    <section class="card">

        <h2 id="selectedDateTitle">

            Sélectionnez un jour

        </h2>

        <div id="missions">

        </div>

    </section>

</main>

<!-- ===================== -->
<!-- SCRIPTS -->
<!-- ===================== -->
<!-- firebase.js, calendar.js et missions.js sont importés -->
<!-- directement par app.js (modules ES6) : un seul point d'entrée. -->

<script type="module" src="js/app.js"></script>

</body>

</html>
