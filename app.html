<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLEU4 - APP</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="topbar">
    <div id="userInfo">Chargement...</div>
    <button id="logoutBtn">Déconnexion</button>
</div>

<div class="container">
    <div id="createMissionBox" class="card">

    <h2>CRÉER UNE MISSION</h2>

    <input id="mTitle" placeholder="Titre">
    <input id="mDesc" placeholder="Description">
    <input id="mDate" type="date">
    <input id="mTime" type="time">
    <input id="mLocation" placeholder="Lieu">

    <input id="mConcerned" placeholder="Concernés (tous ou SDT,CPL...)">

    <button id="createBtn">Créer mission</button>
        <div id="dashboard" class="card">
    <h2>TABLEAU DE BORD</h2>

    <p id="statsTotal"></p>
    <p id="statsPresent"></p>
    <p id="statsAbsent"></p>
    <p id="statsPending"></p>
</div>

</div>

    <h2>CALENDRIER</h2>
<div id="calendar"></div>

<h2 id="selectedDateTitle">MISSIONS</h2>
<div id="missions"></div>

</div>

<script type="module" src="js/app.js"></script>
<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/missions.js"></script>
<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/missions.js"></script>
</body>

</html>
