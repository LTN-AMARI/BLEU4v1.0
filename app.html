<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BLEU4 v2</title>

    <meta name="theme-color" content="#0B1F3A">

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/logo.png">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- ===================== -->
<!-- TOPBAR -->
<!-- ===================== -->

<header class="topbar">

    <div id="userInfo">
        Chargement...
    </div>

    <button id="logoutBtn">
        Déconnexion
    </button>

</header>

<!-- ===================== -->
<!-- CONTENU -->
<!-- ===================== -->

<main class="container">

    <!-- ===================== -->
    <!-- TABLEAU DE BORD -->
    <!-- ===================== -->

    <section id="dashboard" class="card">

        <h2>Tableau de bord</h2>

        <div class="stats">

            <div class="stat">
                <span id="statsTotal">0</span>
                <small>Missions</small>
            </div>

            <div class="stat">
                <span id="statsPresent">0</span>
                <small>Présents</small>
            </div>

            <div class="stat">
                <span id="statsAbsent">0</span>
                <small>Indisponibles</small>
            </div>

            <div class="stat">
                <span id="statsPending">0</span>
                <small>Sans réponse</small>
            </div>

        </div>

    </section>

    <!-- ===================== -->
    <!-- CREATION MISSION -->
    <!-- ===================== -->

    <section id="createMissionBox" class="card">

        <h2>Créer une mission</h2>

        <input
            id="mTitle"
            type="text"
            placeholder="Titre">

        <textarea
            id="mDesc"
            placeholder="Description"></textarea>

        <div class="row">

            <div>

                <label>Date début</label>

                <input
                    id="mStart"
                    type="date">

            </div>

            <div>

                <label>Date fin</label>

                <input
                    id="mEnd"
                    type="date">

            </div>

        </div>

        <input
            id="mLocation"
            type="text"
            placeholder="Lieu">

        <input
            id="mConcerned"
            type="text"
            placeholder="Concernés (Tous / CPL / SDT...)">

        <button id="createBtn">
            Créer la mission
        </button>

    </section>

    <!-- ===================== -->
    <!-- CALENDRIER -->
    <!-- ===================== -->

    <section class="card">

        <div class="calendar-header">

            <button id="prevMonth">
                ◀
            </button>

            <h2 id="monthTitle">
                Mois
            </h2>

            <button id="nextMonth">
                ▶
            </button>

        </div>

        <!-- jours semaine -->

        <div id="weekdays" class="weekdays">

            <div>Lun</div>
            <div>Mar</div>
            <div>Mer</div>
            <div>Jeu</div>
            <div>Ven</div>
            <div>Sam</div>
            <div>Dim</div>

        </div>

        <!-- calendrier -->

        <div id="calendar" class="calendar"></div>

    </section>

    <!-- ===================== -->
    <!-- MISSIONS -->
    <!-- ===================== -->

    <section class="card">

        <h2 id="selectedDateTitle">

            Sélectionnez un jour

        </h2>

        <div id="missions">

        </div>

    </section>

</main>

<!-- ===================== -->
<!-- SCRIPTS -->
<!-- ===================== -->

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/calendar.js"></script>
<script type="module" src="js/missions.js"></script>
<script type="module" src="js/dashboard.js"></script>
<script type="module" src="js/app.js"></script>

</body>

</html>
